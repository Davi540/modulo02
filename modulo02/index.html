<!DOCTYPE html> <!-- informa a pagina que esta usando html5 -->  
<html lang="pt-BR"> <!-- Marca o ínicio da pagina html. o atributo lang="pt-br" indicar que o idioma principal é português-->
<head> <!-- cabeçalho da pagina.aqui fica configurações e informações que não aparecem no corpo da pagina-->
    <meta charset="UTF-8"> <!-- define o padrão de caracteres, permite acentos, c, emojis, e caracteres-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- faz a página se adaptar a celulares e computadores-->
    <title>Meu primeiro site</title> <!--titulo da página, aparece na aba do navegador-->
</head> <!--fecha a tag head-->
<body> <!--corpo da página. tudo oq aparece pro usúario ta aqui-->
    <h1> Bem vindo ao meu site</h1>
    <p>  essa é uma estrutura de html básica </p>
    <ul>
        <li> HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>
    
</body>
</html>
